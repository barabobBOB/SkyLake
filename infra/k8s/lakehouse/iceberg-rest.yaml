apiVersion: v1
kind: Secret
metadata:
  name: iceberg-postgres-credentials
  namespace: lakehouse
type: Opaque
stringData:
  POSTGRES_DB: iceberg
  POSTGRES_USER: iceberg
  POSTGRES_PASSWORD: iceberg-password
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: iceberg-postgres-data
  namespace: lakehouse
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: iceberg-postgres
  namespace: lakehouse
spec:
  replicas: 1
  selector:
    matchLabels:
      app: iceberg-postgres
  template:
    metadata:
      labels:
        app: iceberg-postgres
    spec:
      nodeSelector:
        node-pool: lakehouse-query
      containers:
        - name: postgres
          image: postgres:16
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef:
                name: iceberg-postgres-credentials
          resources:
            requests:
              cpu: "250m"
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: iceberg-postgres-data
---
apiVersion: v1
kind: Service
metadata:
  name: iceberg-postgres
  namespace: lakehouse
spec:
  selector:
    app: iceberg-postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: iceberg-rest
  namespace: lakehouse
spec:
  replicas: 1
  selector:
    matchLabels:
      app: iceberg-rest
  template:
    metadata:
      labels:
        app: iceberg-rest
    spec:
      nodeSelector:
        node-pool: lakehouse-query
      containers:
        - name: iceberg-rest
          image: tabulario/iceberg-rest:1.6.0
          ports:
            - name: http
              containerPort: 8181
          env:
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: minio-credentials
                  key: MINIO_ROOT_USER
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-credentials
                  key: MINIO_ROOT_PASSWORD
            - name: AWS_REGION
              value: us-east-1
            - name: CATALOG_WAREHOUSE
              value: s3://iceberg-warehouse/
            - name: CATALOG_IO__IMPL
              value: org.apache.iceberg.aws.s3.S3FileIO
            - name: CATALOG_S3_ENDPOINT
              value: http://minio.lakehouse.svc.cluster.local:9000
            - name: CATALOG_S3_PATH__STYLE__ACCESS
              value: "true"
            - name: CATALOG_URI
              value: jdbc:postgresql://iceberg-postgres.lakehouse.svc.cluster.local:5432/iceberg
            - name: CATALOG_JDBC_USER
              valueFrom:
                secretKeyRef:
                  name: iceberg-postgres-credentials
                  key: POSTGRES_USER
            - name: CATALOG_JDBC_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: iceberg-postgres-credentials
                  key: POSTGRES_PASSWORD
          resources:
            requests:
              cpu: "500m"
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: iceberg-rest
  namespace: lakehouse
spec:
  selector:
    app: iceberg-rest
  ports:
    - name: http
      port: 8181
      targetPort: http
