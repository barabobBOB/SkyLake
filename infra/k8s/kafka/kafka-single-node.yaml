apiVersion: kafka.strimzi.io/v1
kind: KafkaNodePool
metadata:
  name: pool-a
  namespace: streaming
  labels:
    strimzi.io/cluster: skylake
spec:
  replicas: 1
  roles:
    - controller
    - broker
  storage:
    type: jbod
    volumes:
      - id: 0
        type: persistent-claim
        size: 10Gi
        class: local-path
        deleteClaim: false
  resources:
    requests:
      cpu: "1"
      memory: 2Gi
    limits:
      cpu: "2"
      memory: 3Gi
  template:
    pod:
      nodeSelector:
        node-pool: streaming-processing
---
apiVersion: kafka.strimzi.io/v1
kind: Kafka
metadata:
  name: skylake
  namespace: streaming
spec:
  kafka:
    version: 4.1.0
    metadataVersion: 4.1-IV1
    listeners:
      - name: plain
        port: 9092
        type: internal
        tls: false
    config:
      offsets.topic.replication.factor: 1
      transaction.state.log.replication.factor: 1
      transaction.state.log.min.isr: 1
      default.replication.factor: 1
      min.insync.replicas: 1
      auto.create.topics.enable: "false"
      log.retention.hours: 72
  entityOperator:
    topicOperator: {}
    userOperator: {}
---
apiVersion: kafka.strimzi.io/v1
kind: KafkaTopic
metadata:
  name: bluesky.raw.v1
  namespace: streaming
  labels:
    strimzi.io/cluster: skylake
spec:
  partitions: 6
  replicas: 1
  config:
    retention.ms: 259200000
    cleanup.policy: delete
